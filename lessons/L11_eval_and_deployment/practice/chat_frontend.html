<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L11 Agent Chat</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f7f8fb;
      color: #182033;
    }
    main {
      max-width: 760px;
      margin: 32px auto;
      padding: 0 16px;
    }
    h1 {
      font-size: 24px;
      margin: 0 0 16px;
    }
    #chat-box {
      height: 420px;
      overflow-y: auto;
      border: 1px solid #d9dfeb;
      background: #fff;
      padding: 16px;
    }
    .msg {
      margin: 10px 0;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .user { color: #174ea6; }
    .ai { color: #166534; }
    .tool { color: #6b7280; font-size: 14px; }
    .composer {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    input {
      flex: 1;
      padding: 10px;
      border: 1px solid #cbd5e1;
      font-size: 15px;
    }
    button {
      padding: 10px 18px;
      border: 0;
      background: #2563eb;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main>
    <h1>L11 Agent Chat</h1>
    <div id="chat-box"></div>
    <div class="composer">
      <input id="input" placeholder="输入消息，例如：我入职2年了，有几天年假？">
      <button id="send">发送</button>
    </div>
  </main>

  <script>
    const chatBox = document.getElementById("chat-box");
    const input = document.getElementById("input");
    const sendButton = document.getElementById("send");

    function appendMessage(className, text) {
      const div = document.createElement("div");
      div.className = `msg ${className}`;
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;
      input.value = "";
      appendMessage("user", `你：${message}`);
      const aiDiv = appendMessage("ai", "AI：");

      const isLocal = location.hostname === "localhost" || location.hostname === "127.0.0.1" || location.protocol === "file:";
      const apiUrl = isLocal ? "http://localhost:8000/chat/stream" : "/api/chat/stream";

      try {
        const response = await fetch(apiUrl, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({message, session_id: "web_user"})
        });
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const {done, value} = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, {stream: true});
          const lines = buffer.split("\n");
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const data = JSON.parse(line.slice(6));
            if (data.type === "tool_call") {
              appendMessage("tool", `调用工具：${data.tool}`);
            } else if (data.type === "token") {
              aiDiv.textContent += data.content;
            }
          }
        }
      } catch (error) {
        aiDiv.textContent += `请求失败：${error.message}`;
      }
    }

    sendButton.addEventListener("click", sendMessage);
    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
